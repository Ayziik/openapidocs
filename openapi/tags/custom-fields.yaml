name: Custom Fields
x-displayName: Додаткові поля
description: |
  - Створення та редагування полів доступне тільки через UI keyCRM — API надає лише читання (`GET /custom-fields`).
  - Для полів типу `select` та `multiselect` передавайте масив рядків з назвами опцій. Самі опції доступні через `include=options`.
  - При роботі з кастомними полями в інших запитах використовуйте `uuid` поля — саме він є ідентифікатором поля для передачі значень.
