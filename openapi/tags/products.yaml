name: Products
x-displayName: Товари
description: |
  - Товар — це контейнер верхнього рівня із загальною інформацією (назва, категорія, зображення).
    Ціна, SKU, залишки та габарити зберігаються виключно на рівні варіанту (`Offer`), не товару.
  - При створенні товару завжди автоматично створюється один дефолтний `Offer`.
    Навіть якщо товар без варіантів — він все одно має один дефолтний `Offer`.
  - Для товарів без варіантів `PUT /products/{productId}` дозволяє оновлювати ціну, SKU та габарити
    напряму — система автоматично застосує зміни до дефолтного `Offer`.
  - Додаткові варіанти створюються окремим запитом `POST /products/{productId}/offers`.
  - Для оновлення залишків використовуйте `PUT /offers/stocks` — це стосується всіх товарів,
    включно з тими що не мають варіантів.
