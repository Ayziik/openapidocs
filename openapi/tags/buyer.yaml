name: Buyer
x-displayName: Покупці
description: |
  - Поле `full_name` обов'язкове при створенні покупця.
  - Один покупець може мати кілька телефонів та email-адрес.
  - Номери телефонів рекомендуємо передавати у міжнародному форматі з префіксом `+`.
  - Дані про знижки та накопичені суми покупок доступні через `include=loyalty`.
