name: Payments
x-displayName: Зовнішні транзакції
description: |
  - Зовнішні транзакції — це записи з банківських виписок (Monobank, PrivatBank тощо).
    Вони не є оплатами — їх можна лише отримати та прив'язати до існуючої оплати.
  - Оплати створюються та існують виключно в рамках сутності: замовлення або картки воронки.
  - Щоб прив'язати транзакцію до оплати, спочатку отримайте `id` потрібної оплати з сутності,
    потім передайте його в `POST /payments/{paymentId}/external-transactions`.
