name: Calls
x-displayName: Дзвінки
description: |
  - Розділ тільки для читання — дзвінки потрапляють до системи через інтеграцію з телефонією.
  - Дзвінки автоматично пов'язуються з покупцями або картками воронок на основі номера телефону.
  - В `include` доступні асоціації з сутностями `lead` (картка воронки) та `client` (покупець).
