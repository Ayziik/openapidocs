name: Order
x-displayName: Замовлення
description: |
  - При створенні замовлення обов'язкові поля: `source_id` (джерело) та `buyer` (покупець).
    Список доступних джерел: `GET /order/source`.
  - Якщо передати контактні дані покупця при створенні замовлення — новий покупець створюється автоматично.
  - Щоб отримати повну інформацію про замовлення, використовуйте параметр `include` — без нього
    повертається лише базова сутність.
  - `PUT /order/{orderId}` дозволяє лише змінювати вже додані до замовлення товари — додавати нові не можна.
    Для ідентифікації товару передавайте або `id` позиції в замовленні (не `id` з каталогу), або `sku`.
