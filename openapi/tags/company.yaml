name: Company
x-displayName: Компанії
description: |
  - Поле `name` обов'язкове при створенні компанії.
  - Компанія може бути пов'язана з багатьма покупцями. Зв'язок можна керувати з обох сторін: через поле `company_id` на стороні покупця, або через масив `buyer_id` на стороні компанії.
  - Для зберігання IBAN або інших платіжних реквізитів використовуйте поле `bank_account`.
