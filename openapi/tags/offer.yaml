name: Offer
x-displayName: Варіанти товарів
description: |
  - `Offer` — це конкретний варіант товару. Саме на рівні `Offer` зберігаються ціна, артикул (`sku`), залишки та габарити.
  - Кожен товар має мінімум один `Offer` — дефолтний, який створюється автоматично разом з товаром.
  - Щоб отримати дані батьківського товару разом з варіантом, використовуйте `GET /offers?include=product`.
  - Для оновлення варіанту передавайте або внутрішній `id`, або `sku` — один з них обов'язковий.
  - Оновлення варіантів (`PUT /offers`) та оновлення залишків (`PUT /offers/stocks`) — різні ендпоінти з різною структурою запиту.
  - Якщо використовуєте кілька складів, передавайте `filter[details]=true` для отримання розбивки залишків по кожному складу окремо.
