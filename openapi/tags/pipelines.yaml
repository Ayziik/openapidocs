name: Pipelines
x-displayName: Воронки
description: |
  - Якщо розділ «Воронки» вимкнено в налаштуваннях CRM — всі запити повертатимуть `400 Leads are not enabled`.
  - Воронок у системі може бути багато, кожна має власний ідентифікатор і власний набір статусів.
  - Статуси між воронками не є спільними — перед створенням картки отримайте актуальний список статусів
    саме тієї воронки, з якою працюєте: `GET /pipelines/{pipelineId}/statuses`.
  - Якщо передати `status_id` з іншої воронки — картка автоматично переміститься до тієї воронки.
  - Для карток доступна робота з оплатами та файлами — аналогічно до замовлень.
  - Поле `contact` при створенні картки є обов'язковим. Якщо передати лише дані контакту —
    покупець **не створюється автоматично**, буде збережено тільки контакт.
  - Щоб картка одразу була пов'язана з покупцем, спочатку створіть покупця через `POST /buyer`,
    а потім передайте `client_id` зі значенням `id` створеного покупця.
