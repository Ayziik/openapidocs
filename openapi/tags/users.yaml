name: Users
x-displayName: Користувачі
description: |
  - Розділ тільки для читання — керування користувачами через API недоступне.
  - `id` користувача використовується як `manager_id` при створенні та оновленні замовлень, карток воронок і покупців.
  - Фільтруйте активних користувачів (`filter[status]=active`), щоб не призначати заблокованих співробітників.
