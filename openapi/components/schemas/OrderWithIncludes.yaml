OrderWithIncludes:
  required:
    - source_id
  type: object
  description: "Схема замовлення з усіма доступними асоціаціями"
  properties:
    id:
      type: integer
      description: "Ідентифікатор замовлення"
      example: 22
    parent_id:
      type: integer
      nullable: true
      description: "Ідентифікатор батьківського замовлення"
      example: 1
    source_uuid:
      type: string
      nullable: true
      description: "Унікальний ідентифікатор замовлення із завантаженого джерела"
      example: "4815162342"
    source_id:
      type: integer
      example: 11
      description: "Ідентифікатор джерела"
    status_id:
      type: integer
      example: 1
      description: "Ідентифікатор статусу замовлення"
    status_group_id:
      type: integer
      example: 1
      description: "Ідентифікатор групи статусу замовлення"
    grand_total:
      type: number
      description: "Фінальна вартість"
      example: 122.5
    promocode:
      type: string
      example: MERRYCHRISTMAS
      description: "Промо код"
    total_discount:
      type: number
      description: "Сума знижки"
      example: 30.5
    expenses_sum:
      description: "Сума витрат"
      type: number
      example: 20.5
    shipping_price:
      description: "Вартість доставки"
      type: number
      example: 2.5
    wrap_price:
      description: "Вартість подарункової упаковки"
      type: number
      example: 3.5
    taxes:
      description: "Сума податків"
      type: number
      example: 2.5
    manager_comment:
      description: "Коментар менеджера"
      type: string
      nullable: true
      example: null
    buyer_comment:
      description: "Коментар клієнта"
      type: string
      nullable: true
      example: "Hello from buyer"
    gift_message:
      description: "Вітальне повідомлення"
      type: string
      nullable: true
      example: "Happy Birthday Charlie"
    is_gift:
      description: "Позначено як подарунок"
      type: boolean
      example: true
    payment_status:
      description: "Статус оплати"
      type: string
      enum:
        - not_paid
        - part_paid
        - paid
        - overpaid
      example: paid
    last_synced_at:
      type: string
      description: "Дата останньої синхронізації із джерелом в UTC форматі"
      example: "2020-05-16 17:00:07"
    created_at:
      type: string
      description: "Дата створення замовлення в системі в UTC форматі"
      example: "2020-05-16 17:00:07"
    ordered_at:
      type: string
      description: "Дата створення замовлення на джерелі в UTC форматі. Може не співпадати з `created_at`. При використанні фільтра по даті створення, вибірка робиться по цьому параметру"
      example: "2020-05-16 17:00:07"
    updated_at:
      type: string
      description: "Дата останньої зміни замовлення в UTC форматі"
      example: "2020-05-16 17:00:07"
    closed_at:
      type: string
      description: "Дата закриття замовлення в UTC форматі"
      example: "2020-05-16 17:00:07"
    buyer:
      type: object
      description: "Інформація про покупця. Повертається тільки, якщо вказати `include=buyer`"
      properties:
        id:
          description: "ID покупця в keyCRM"
          type: integer
          nullable: true
          example: 1
        full_name:
          description: "Повне ім'я покупця"
          type: string
          nullable: true
          example: "John Doe"
        email:
          description: "E-mail покупця"
          type: string
          nullable: true
          example: john.doe@mail.app
        phone:
          description: "Телефон покупця"
          type: string
          nullable: true
          example: "+1 555-234-1234"
        company_id:
          description: "ID компанії зв'язаної з покупцем"
          type: integer
          nullable: true
          example: 112
        manager_id:
          description: "ID менеджера зв'язаного з покупцем"
          type: integer
          nullable: true
          example: 12
    products:
      description: "Товари в замовленні. Повертаються тільки, якщо вказати `include=products.offer`"
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            example: "Iphone XS max 256gb"
            description: "Назва товару"
          sku:
            type: string
            example: 001-242
            description: "Артикул товару"
          price:
            type: number
            example: 124.5
            description: "Ціна товару за одиницю"
          price_sold:
            type: number
            example: 124.5
            description: "Ціна товару продажу за одиницю"
          purchased_price:
            type: number
            example: 124.5
            description: "Ціна закупівлі товару за одиницю"
          discount_percent:
            type: number
            example: 11.5
            nullable: true
            description: "Знижка на товар у %"
          discount_amount:
            type: number
            example: 9.99
            nullable: true
            description: "Знижка на товар фіксована"
          total_discount:
            type: number
            example: 9.99
            nullable: true
            description: "Сумарна знижка на товар"
          quantity:
            type: number
            example: 1
            description: "Кількість замовлених одиниць товару"
          unit_type:
            type: string
            nullable: true
            example: кг
            description: "Одиниці виміру товару. Якщо використовуються системні `шт`, то значення буде `null`"
          upsale:
            type: boolean
            example: true
            description: "Допродаж (так/ні)"
          comment:
            type: string
            example: "Наклеїти плівку"
            description: "Коментар до товару"
          product_status_id:
            type: integer
            example: 2
            description: "ID статусу товару в замовленні"
          picture:
            type: string
            nullable: true
            description: "Посилання на зображення товару"
            example: "https://i.etsystatic.com/22591342/r/il/52142a/2285383547/il_570xN.2285383547_h8a2.jpg"
          properties:
            required:
              - name
              - value
            type: array
            description: "Атрибути товару. <br/> Важливо: Кожен атрибут має включати в себе поля `name` і `value`. <br/> Атрибут без цих ключів буде ігноруватися "
            items:
              type: object
              properties:
                name:
                  type: string
                  example: Color
                value:
                  type: string
                  example: Gold
          shipment_type:
            type: string
            example: warehouse
            description: "Тип відвантаження товару. Можливі значення: `warehouse` (склад) або `manufacturing` (виробництво)"
          warehouse:
            type: object
            description: "Інформація про склад відвантаження товару. Повертається тільки якщо `shipment_type === warehouse`"
            properties:
              id:
                type: integer
                description: "Ідентифікатор складу"
                example: 3
              name:
                type: string
                description: "Назва складу"
                example: "Київ №1"
              description:
                description: "Опис складу"
                type: string
                example: "Головний склад"
              is_active:
                description: "Ознака того, чи активний склад"
                type: boolean
                example: true
          offer:
            description: "Інформація про товар в каталозі keyCRM"
            type: object
            properties:
              id:
                type: integer
                description: "Ідентифікатор варіанту товару"
                example: 22
              product_id:
                type: integer
                description: "Ідентифікатор товару до якого відноситься варіант"
                example: 22
              sku:
                description: "SKU варіанту товару"
                type: string
                example: sku001
              barcode:
                description: "Штрих-код товару"
                type: string
                example: "11222111211"
              price:
                type: number
                example: 123.5
                description: "Вартість варіанту товару"
              purchased_price:
                type: number
                example: 50.5
                description: "Закупівельна вартість варіанту товару"
              quantity:
                type: number
                example: 98
                description: "Загальна кількість залишків"
              weight:
                type: number
                example: 12.5
                description: "Вага варіанту товару в системних одиницях"
              length:
                type: number
                example: 25.0
                description: "Довжина варіанту товару в системних одиницях"
              width:
                type: number
                example: 10.0
                description: "Ширина варіанту товару в системних одиницях"
              height:
                type: number
                example: 7.5
                description: "Висота варіанту товару в системних одиницях"
              properties:
                type: array
                description: "Властивості варіанту товару"
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Color
                    value:
                      type: string
                      example: Gol
    manager:
      type: object
      description: "Інформація про менеджера замовлення. Повертається тільки, якщо вказати `include=manager`"
      properties:
        id:
          description: "ID менеджера"
          type: integer
          nullable: true
          example: 1
        first_name:
          description: "Ім'я менеджера"
          type: string
          nullable: true
          example: John
        last_name:
          description: "Прізвище менеджера"
          type: string
          nullable: true
          example: Doe
        full_name:
          description: "Повне ім'я менеджера"
          type: string
          nullable: true
          example: "John Doe"
        username:
          description: "Логін менеджера"
          type: string
          nullable: true
          example: johndoe
        email:
          description: "E-mail менеджера"
          type: string
          nullable: true
          example: john.doe@mail.app
        phone:
          description: "Телефон менеджера"
          type: string
          nullable: true
          example: "+1 555-234-1234"
        role_id:
          description: "ID ролі менеджера"
          type: integer
          nullable: true
          example: 2
        status:
          description: "Статус менеджера. Можливі варіанти: active або blocked"
          type: string
          nullable: false
          example: active
        created_at:
          type: string
          description: "Дата створення в UTC форматі"
          example: "2020-05-16 17:00:07"
        updated_at:
          type: string
          description: "Дата останньої зміни в UTC форматі"
          example: "2020-05-16 17:00:07"
        last_logged_at:
          type: string
          description: "Дата останнього логіну в UTC форматі"
          example: "2020-05-16 17:00:07"
    tags:
      type: array
      description: "Теги в замовленні. Повертаються тільки, якщо вказати `include=tags`"
      items:
        type: object
        properties:
          id:
            type: integer
            description: "Ідентифікатор тегу"
          name:
            type: string
            description: Назва
            example: Hot
          alias:
            type: string
            description: "Системна назва"
            example: hot
          color:
            description: "Колір тегу в форматі HEX"
            type: string
            example: "#FF0000"
          created_at:
            type: string
            description: "Дата створення в UTC форматі"
            example: "2020-05-16 17:00:07"
          updated_at:
            type: string
            description: "Дата останньої зміни в UTC форматі"
            example: "2020-05-16 17:00:07"
    status:
      description: "Інформація про поточний статус замовлення. Повертається тільки, якщо вказати `include=status`"
      type: object
      properties:
        id:
          type: integer
          description: "Ідентифікатор статусу"
        name:
          type: string
          description: Назва
          example: Hot
        alias:
          type: string
          description: "Системна назва"
          example: hot
        is_active:
          type: boolean
          description: "Стан активності"
          example: true
        group_id:
          type: integer
          description: "Ідентифікатор групи статусу"
          example: 1
        is_closing_order:
          type: boolean
          description: "Визначає, чи може замовлення бути відмічене як закрите після присвоєння статусу"
          example: true
        is_reserved:
          type: boolean
          description: "Визначає, чи статус зарезервований і чи може він бути видалений"
          example: true
        created_at:
          type: string
          description: "Дата створення в UTC форматі"
          example: "2020-05-16 16:56:44"
        updated_at:
          type: string
          description: "Дата останньої зміни в UTC форматі"
          example: "2020-05-16 16:56:44"
    marketing:
      description: "Інформація про UTM-мітки в замовленні. Повертається тільки, якщо вказати `include=marketing`"
      type: object
      properties:
        utm_source:
          type: string
          nullable: true
          example: facebook
          description: "Джерело кампанії"
        utm_medium:
          type: string
          nullable: true
          example: banner
          description: "Тип трафіку"
        utm_campaign:
          type: string
          nullable: true
          example: sale
          description: "Назва кампанії"
        utm_term:
          type: string
          nullable: true
          example: "landing page"
          description: "Ключове слово"
        utm_content:
          type: string
          nullable: true
          example: "-30%"
          description: "Ідентифікатор оголошення"
        created_at:
          type: string
          description: "Дата створення в UTC форматі"
          example: "2020-05-16 16:56:44"
        updated_at:
          type: string
          description: "Дата останньої зміни в UTC форматі"
          example: "2020-05-16 16:56:44"
    payments:
      type: array
      description: "Платежі в замовленні. Повертаються тільки, якщо вказати `include=payments`"
      items:
        type: object
        properties:
          id:
            type: integer
            example: 2233
            description: "ID платежу в keyCRM"
          destination_id:
            type: integer
            example: 2
            description: "ID замовлення в keyCRM"
          payment_method_id:
            type: integer
            example: 2
            description: "ID методу платежу в keyCRM"
          amount:
            type: number
            example: 123.5
            description: "Сума платежу"
          actual_currency:
            type: string
            example: UAH
            nullable: true
            description: "Валюта платежу"
          transaction_uuid:
            type: string
            example: UD12345
            nullable: true
            description: "ID зовнішньої транзакції зв'язаної з платежем"
          description:
            type: string
            example: "Авансовий платіж"
            nullable: true
            description: "Коментар до платежу"
          status:
            type: string
            enum:
              - paid
              - not_paid
              - canceled
            example: paid
            nullable: true
            description: "Статус оплати"
          fiscal_result:
            type: object
            example: '{"url": "https://cabinet.tax.gov.ua/cashregs/check?id=TEST-Zk5OwL, "uuid": "c05702fe-6ae8-4e92-8241-2a6c06ff5439", "amount": 1455, "fiscal_url": "https://check.checkbox.ua/c05702fe-6ae8-4e92-8241-2a6c06ff5439", "payment_cash": false, "payment_name": "Картка", "payment_type": "postpaid"}'
            nullable: true
            description: "Інформація про результат фіскалізації платежу"
          payment_date:
            type: string
            nullable: true
            example: "2021-02-21 14:44:00"
            description: "Дата і час платежу"
          created_at:
            type: string
            description: "Дата створення платежу в UTC форматі"
            example: "2020-05-16 17:00:07"
          updated_at:
            type: string
            description: "Дата останньої зміни платежу в UTC форматі"
            example: "2020-05-16 17:00:07"
    shipping:
      description: "Інформація про доставку. Повертається тільки заповнені, якщо вказати `include=shipping`"
      type: object
      properties:
        delivery_service_id:
          type: integer
          nullable: true
          example: 1
          description: "ID служби доставки в keyCRM"
        tracking_code:
          type: string
          nullable: true
          example: "20450644192161"
          description: "Трекінг-код замовлення"
        shipping_status:
          type: string
          nullable: true
          example: invoice
          description: "Статус доставки замовлення"
        shipping_address_city:
          description: "Місто доставки"
          type: string
          nullable: true
          example: Kyiv
        shipping_address_country:
          description: "Країна доставки"
          type: string
          nullable: true
          example: Ukraine
        shipping_address_country_code:
          description: "Код країни доставки"
          type: string
          nullable: true
          example: UA
        shipping_address_region:
          type: string
          nullable: true
          example: Kyivska
          description: "Область, штат, регіон"
        shipping_address_zip:
          description: Індекс
          type: string
          nullable: true
          example: "50000"
        shipping_secondary_line:
          description: "Додаткова адреса"
          type: string
        shipping_receive_point:
          type: string
          nullable: true
          example: "Склад #12"
          description: "Точка видачі замовлення"
        recipient_full_name:
          type: string
          nullable: true
          example: "Ann Doe"
          description: "Ім'я отримувача (якщо відрізняється від покупця)"
        recipient_phone:
          type: string
          nullable: true
          example: "+1 555-234-7777"
          description: "Номер телефону отримувача (якщо відрізняється від покупця)"
        shipping_date_actual:
          type: string
          description: "Дата доставки / відправки"
          example: "2023-04-21T00:00:00.000000Z"
    expenses:
      type: array
      description: "Витрати в замовленні. Повертаються тільки, якщо вказати `include=expenses`"
      items:
        type: object
        properties:
          id:
            type: integer
            example: 2233
            description: "ID витрати в keyCRM"
          destination_id:
            type: integer
            example: 2
            description: "ID замовлення в keyCRM"
          expense_type_id:
            type: integer
            example: 2
            description: "ID типу витрати в keyCRM"
          amount:
            type: number
            example: 123.5
            description: "Сума витрати"
          actual_currency:
            type: string
            example: UAH
            nullable: true
            description: "Валюта витрати"
          transaction_uuid:
            type: string
            example: UD12345
            nullable: true
            description: "ID зовнішньої транзакції зв'язаної з витратою"
          description:
            type: string
            example: Доставка
            nullable: true
            description: "Коментар до витрати"
          status:
            type: string
            enum:
              - paid
              - not_paid
              - canceled
            example: paid
            nullable: true
            description: "Статус оплати"
          payment_date:
            type: string
            nullable: true
            example: "2021-02-21 14:44:00"
            description: "Дата і час витрати"
          created_at:
            type: string
            description: "Дата створення витрати в UTC форматі"
            example: "2020-05-16 17:00:07"
          updated_at:
            type: string
            description: "Дата останньої зміни витрати в UTC форматі"
            example: "2020-05-16 17:00:07"
    custom_fields:
      type: array
      description: "Користувацькі поля в замовленні. Повертаються тільки заповнені, якщо вказати `include=custom_fields`"
      items:
        type: object
        properties:
          id:
            description: "ID поля в системі"
            type: integer
            example: 123
          uuid:
            description: "Зовнішній ідентифікатор поля"
            type: string
            example: OR_1037
          name:
            description: "Назва поля"
            type: string
            example: Кличка
          type:
            description: "Тип поля. Можливі значення: `link (посилання)`, `select (список/мультисписок)`, `switcher (так/ні)`, `float (число)`, `number (ціле число)`, `textarea (текст)`, `text (рядок)`, `date (дата)`, `datetime (дата і час)`"
            type: string
            example: text
          value:
            description: "Значення поля. Для полів з типом `select (список/мультисписок)` повертається масив рядків."
            type: string
            example: Лорд
    assigned:
      type: array
      description: "Відповідальні користувачі в замовленні. Повертаються тільки, якщо вказати `include=assigned`"
      items:
        type: object
        properties:
          id:
            description: "ID користувача"
            type: integer
            nullable: true
            example: 1
          first_name:
            description: "Ім'я користувача"
            type: string
            nullable: true
            example: John
          last_name:
            description: "Прізвище користувача"
            type: string
            nullable: true
            example: Doe
          full_name:
            description: "Повне ім'я користувача"
            type: string
            nullable: true
            example: "John Doe"
          username:
