User:
  required:
    - full_name
  type: object
  properties:
    id:
      description: 'ID менеджера'
      type: integer
      nullable: true
      example: 1
    first_name:
      description: "Ім'я менеджера"
      type: string
      nullable: true
      example: John
    last_name:
      description: 'Прізвище менеджера'
      type: string
      nullable: true
      example: Doe
    full_name:
      description: "Повне ім'я менеджера"
      type: string
      nullable: true
      example: 'John Doe'
    username:
      description: 'Логін менеджера'
      type: string
      nullable: true
      example: johndoe
    email:
      description: 'E-mail менеджера'
      type: string
      nullable: true
      example: john.doe@mail.app
    phone:
      description: 'Телефон менеджера'
      type: string
      nullable: true
      example: '+1 555-234-1234'
    role_id:
      description: 'ID ролі менеджера'
      type: integer
      nullable: true
      example: 2
    status:
      description: 'Статус менеджера. Можливі варіанти: active, pending або blocked'
      type: string
      nullable: false
      example: active
    created_at:
      type: string
      description: 'Дата створення в UTC форматі'
      example: '2020-05-16 17:00:07'
    updated_at:
      type: string
      description: 'Дата останньої зміни в UTC форматі'
      example: '2020-05-16 17:00:07'
    last_logged_at:
      type: string
      description: 'Дата останньої логіну в UTC форматі'
      example: '2020-05-16 17:00:07'
