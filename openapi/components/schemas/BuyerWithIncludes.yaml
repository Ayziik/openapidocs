BuyerWithIncludes:
  required:
    - full_name
  type: object
  properties:
    id:
      type: integer
      description: 'Ідентифікатор покупця'
      example: 22
    full_name:
      type: string
      nullable: false
      example: 'John Doe'
    birthday:
      type: string
      description: 'Дата народження'
      nullable: true
      example: '2020-05-16'
    email:
      type: array
      nullable: true
      items:
        type: string
      example:
        - john.doe@mail.app
        - john.doe2@mail.app
    phone:
      type: array
      nullable: true
      items:
        type: string
      example:
        - '+1 555-234-1234'
        - '+1 555-234-7777'
    note:
      type: string
      nullable: true
      example: Примітка
    company:
      type: object
      description: 'Інформація про компанію покупця. Повертається тільки, якщо вказати `include=company`'
      properties:
        id:
          description: 'ID компанії'
          type: integer
          nullable: false
          example: 1
        name:
          description: 'Назва компанії'
          type: string
          nullable: false
          example: Keycrm
        full_name:
          description: 'Пона назва компанії'
          type: string
          nullable: true
          example: 'ТОВ Кейцрм'
        address:
          description: 'Адресса компанії'
          type: string
          nullable: true
          example: 'ТОВ Кейцрм'
        banking_detailse:
          description: 'Банківскі деталі'
          type: string
          nullable: true
          example: UA123456789101112
        note:
          type: string
          nullable: true
          example: Примітка
        created_at:
          type: string
          description: 'Дата створення покупця в UTC форматі'
          example: '2020-05-16 17:00:07'
        updated_at:
          type: string
          description: 'Дата останньої зміни покупця в UTC форматі'
          example: '2020-05-16 17:00:07'
    manager:
      type: object
      description: 'Інформація про менеджера покупця. Повертається тільки, якщо вказати `include=manager`'
      properties:
        id:
          description: 'ID менеджера'
          type: integer
          nullable: false
          example: 1
        first_name:
          description: "Ім'я менеджера"
          type: string
          nullable: false
          example: John
        last_name:
          description: 'Прізвище менеджера'
          type: string
          nullable: true
          example: Doe
        full_name:
          description: "Повне ім'я менеджера"
          type: string
          nullable: true
          example: 'John Doe'
        username:
          description: 'Логін менеджера'
          type: string
          nullable: true
          example: johndoe
        email:
          description: 'E-mail менеджера'
          type: string
          nullable: true
          example: john.doe@mail.app
        phone:
          description: 'Телефон менеджера'
          type: string
          nullable: true
          example: '+1 555-234-1234'
        role_id:
          description: 'ID ролі менеджера'
          type: integer
          nullable: true
          example: 2
        status:
          description: 'Статус менеджера. Можливі варіанти: active або blocked'
          type: string
          nullable: false
          example: active
        created_at:
          type: string
          description: 'Дата створення в UTC форматі'
          example: '2020-05-16 17:00:07'
        updated_at:
          type: string
          description: 'Дата останньої зміни в UTC форматі'
          example: '2020-05-16 17:00:07'
        last_logged_at:
          type: string
          description: 'Дата останньої логіну в UTC форматі'
          example: '2020-05-16 17:00:07'
    loyalty:
      description: 'Інформація про програми лояльності. Повертається тільки заповнені, якщо вказати `include=loyalty`'
      type: array
      items:
        type: object
        properties:
          loyalty_program_name:
            description: 'Назва програми лояльності'
            type: string
            example: 'Програма лояльності'
          loyalty_program_id:
            description: 'Ідентифікатор програми лояльності'
            type: integer
            example: 10
          loyalty_program_level_name:
            description: 'Назва поточного рівня покупця в програмі лояльності'
            type: string
            example: 'Перший рівень'
          loyalty_program_level_id:
            description: 'Ідентифікатор поточного рівня покупця в програмі лояльності'
            type: integer
            example: 20
          amount:
            description: 'Сума покупок'
            type: integer
            example: 270.02
          discount:
            description: 'Поточна знижка покпуця по програмі лояльності'
            type: integer
            example: 5
    shipping:
      description: 'Інформація про адреси доставки. Повертається тільки заповнені, якщо вказати `include=shipping`'
      type: array
      items:
        type: object
        properties:
          address:
            type: string
            nullable: true
            description: 'Адреса доставки'
          additional_address:
            type: string
          city:
            description: 'Місто доставки'
            type: string
            nullable: true
            example: Kyiv
          region:
            type: string
            nullable: true
            example: Kyivska
            description: 'Область, штат, регіон'
          zip_code:
            type: string
            nullable: true
            example: '50000'
            description: Індекс
          country:
            type: string
            nullable: true
            example: Ukraine
            description: 'Країна доставки'
          recipient_full_name:
            type: string
            nullable: true
            example: 'Ann Doe'
            description: "Ім'я отримувача (якщо відрізняється від покупця)"
          recipient_phone:
            type: string
            nullable: true
            example: '+1 555-234-7777'
            description: 'Номер телефону отримувача (якщо відрізняється від покупця)'
          warehouse_ref:
            type: string
            nullable: true
            example: 1ec09d2e-e1c2-11e3-8c4a-0050568002cf
            description: "UUID складу Нової Пошти (обов'язково з параметром delivery_service_id - ID служби доставки НП в СРМ)"
    custom_fields:
      type: array
      description: 'Користувацькі поля для покупця'
      items:
        type: object
        properties:
          uuid:
            description: 'Зовнішній ідентифікатор поля'
            type: string
            example: OR_1037
          value:
            description: 'Значення поля. Для полів з типом `select (список/мультисписок)` передавати масив рядків.'
            type: string
            example: Лорд
    created_at:
      type: string
      description: 'Дата створення покупця в UTC форматі'
      example: '2020-05-16 17:00:07'
    updated_at:
      type: string
      description: 'Дата останньої зміни покупця в UTC форматі'
      example: '2020-05-16 17:00:07'
