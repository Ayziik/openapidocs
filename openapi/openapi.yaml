openapi: 3.0.0
info:
  title: "keyCRM OpenAPI documentation"
  description: |
    **Зверніть увагу:**

    1. **Авторизація:** потрібно передавати заголовок у форматі `Bearer + ваш-API-ключ` 
       (наприклад: `authorization: Bearer ВашКлюч`). Детальніше: [як отримати API-ключ](https://help.keycrm.app/uk/process-automation-api-and-more/where-to-get-an-api-key).

    2. **Обмеження:** встановлено ліміт до **20 запитів на хвилину** по одному API-ключу.

    3. **Формат часу:** у всіх сутностях використовується **UTC (GMT+0)**. Це стосується зчитування (GET), фільтрації за часом та створення нових записів (POST).

    4. **Фільтрація:** виконується через query-параметри у форматі `filter[поле]=значення`. Для передачі кількох значень одного фільтра перераховуйте їх через кому. Приклад:
        ```
          GET /order?filter[status_id]=1,4
        ```
  version: 1.2.0
