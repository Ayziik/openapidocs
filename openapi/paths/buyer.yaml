/buyer/import:
  post:
    tags:
      - Buyer
    summary: 'Імпорт покупців'
    description: 'Даний маршрут імпортує покупців.'
    operationId: importBuyers
    parameters:
      - $ref: '#/components/parameters/acceptParam'
    requestBody:
      description: "Приклад об'єкту запиту для імпорту покупців"
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - buyers
            properties:
              buyers:
                type: array
                items:
                  type: object
                  properties:
                    full_name:
                      description: "Повне ім'я покупця"
