    summary: 'Створення нових товарів списком'
    description: 'Даний маршрут дозволяє створювати нові товари списком, до 100 шт.
      за один запит.'
    operationId: createNewProductImport
    parameters:
      - $ref: '#/components/parameters/acceptParam'
    requestBody:
      description: 'Приклад запиту для створення нових товарів списком.'
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - products
            properties:
              products:
                type: array
                maximum: 100
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: 'Назва товару'
