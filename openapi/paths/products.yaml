'/products/{productId}/offers':
  post:
    tags:
      - Products
    summary: 'Створення нових варіантів товару'
    description: 'Даний маршрут створює нові варіанти товару. Максимум 100 шт. за
      один запит.'
    operationId: createNewProductOffers
    parameters:
      - name: productId
        in: path
        required: true
        description: 'Ідентифікатор товару'
        schema:
          type: string
      - $ref: '#/components/parameters/acceptParam'
    requestBody:
      description: "Приклад об'єкту запиту для створення новых варіантів товару"
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              offers:
                type: array
                maximum: 100
                items:
                  type: object
                  properties:
                    sku:
                      type: string
                      example: 001-242
                      description: 'Артикул варіанту товару'
                    barcode:
                      type: string
                      description: 'Штрих-код товару'
                      example: '11222111211'
                    price:
                      type: number
                      example: 11.99
                      description: 'Вартість варіанту товару'
                    purchased_price:
                      type: number
                      example: 9.99
                      description: 'Закупівельна вартість варіанту товару'
                    weight:
                      type: number
                      example: 0.2
                      description: 'Вага варіанту товару в одиницях налаштувань у keyCRM'
                    height:
                      type: number
                      example: 10.0
                      description: 'Висота варіанту товару в одиницях налаштувань у keyCRM'
                    image_url:
                      type: string
                      example: 'https://example.com/image.jpg'
                      description: 'Посилання на зображення варіанту товару'
                    length:
                      type: number
                      example: 15.0
                      description: 'Довжина варіанту товару в одиницях налаштувань у keyCRM'
                    width:
                      type: number
                      example: 5.0
                      description: 'Ширина варіанту товару в одиницях налаштувань у keyCRM'
                    properties:
                      required:
                        - name
                        - value
                      type: array
                      description: 'Властивості варіанту. Кожна властивість має включати в себе
                        параметри `name` і `value`, без них буде ігноруватися.'
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Color
                          value:
                            type: string
                            example: Gold
    responses:
      201:
        description: 'Успішна відповідь'
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: boolean
                  example: true
      400:
        description: 'Помилка запиту.'
      401:
        description: 'Помилка авторизації.'
    security:
      - bearerAuth: {}
/products/categories:
  get:
    tags:
      - Products
    summary: 'Отримання списку категорій товарів'
    description: 'Даний маршрут повертає пагінований список категорій товарів.'
    operationId: getPaginatedListOfCategories
    parameters:
      - $ref: '#/components/parameters/acceptParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/pageParam'
      - name: filter
        in: query
        description: 'Фільтрація списку категорій товарів'
        required: false
        style: deepObject
        explode: true
        schema:
          type: object
        examples:
          filter_by_category_id:
            value:
              category_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором категорії, допустимі значення: 1, 10, 4546,
              ...'
          filter_by_parent_id:
            value:
              parent_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором батьківської категорії, допустимі значення:
              1, 10, 4546, ...'
    responses:
      200:
        description: 'Успішна відповідь для запиту. Результат у пагінованому вигляді.'
        content:
          application/json:
            schema:
              type: object
              allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Category'
      401:
        description: 'Помилка авторизації.'
    security:
      - bearerAuth: {}
  post:
    tags:
      - Products
    summary: 'Створення нової категорії товарів'
    description: 'Даний маршрут створює нову категорію товарів.'
    operationId: createNewCategory
    parameters:
      - $ref: '#/components/parameters/acceptParam'
    requestBody:
      description: "Приклад об'єкту запиту для створення нової категорії товарів"
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - full_name
            properties:
              name:
                description: 'Назва категорії'
                type: string
                nullable: false
                example: Взуття
              parent_id:
                description: 'Ідентифікатор батьківської категорії, якщо створюєте
                  підкатегорію.'
                type: integer
                nullable: true
                example: 1
    responses:
      201:
        description: 'Успішна відповідь від сервера.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      401:
        description: 'Помилка авторизації.'
    security:
      - bearerAuth: {}
