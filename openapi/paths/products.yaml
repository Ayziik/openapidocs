                      description: 'Зображення товару, максимум 6 штук, перше - головне'
                      type: array
                      items:
                        type: string
                      example:
                        - 'https://i.etsystatic.com/22591342/r/il/52142a/2285383547/il_570xN.2285383547_h8a2.jpg'
                        - 'https://via.assets.so/img.jpg?w=400&h=150&tc=blue&bg=#cecece'
                    currency_code:
                      type: string
                      description: 'Валюта товару'
                      example: UAH
                    sku:
                      type: string
                      description: 'Артикул товару'
                      example: 001-242
                    barcode:
                      description: 'Штрих-код товару'
                      type: string
                      example: '11222111211'
                    price:
                      type: number
                      example: 124.5
                      description: 'Ціна товару за одиницю'
                    purchased_price:
                      type: number
                      example: 124.5
                      description: 'Ціна закупівлі товару за одиницю'
                    unit_type:
                      type: string
                      example: кг
                      description: 'Одиниці виміру товару'
                    weight:
                      type: number
                      example: 12.5
                      description: 'Вага товару за замовчуванням'
                    length:
                      type: number
                      example: 25.0
                      description: 'Довжина товару за замовчуванням'
                    width:
                      type: number
                      example: 10.0
                      description: 'Ширина товару за замовчуванням'
                    height:
                      type: number
                      example: 7.5
                      description: 'Висота товару за замовчуванням в системних одиницях'
                    category_id:
                      type: number
                      example: 1
                      description: 'ID категорії товару'
                    custom_fields:
                      type: array
                      description: 'Користувацькі поля в товарі'
                      items:
                        type: object
                        properties:
                          uuid:
                            description: 'Зовнішній ідентифікатор поля'
                            type: string
                            example: CT_1108
                          value:
                            description: 'Значення поля. Для полів з типом `select (список/мультисписок)`
                              передавати масив рядків.'
                            type: string
                            example: Лорд
    responses:
      201:
        description: 'Успішна відповідь'
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: boolean
                  example: true
      401:
        description: 'Помилка авторизації.'
