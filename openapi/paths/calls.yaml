/calls:
  get:
    tags:
      - Calls
    summary: 'Отримання списку дзвінків'
    description: 'Даний маршрут повертає пагінований список дзвінків.'
    operationId: getPaginatedListOfCalls
    parameters:
      - $ref: '#/components/parameters/acceptParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/pageParam'
      - name: include
        in: query
        description: 'Підключення додаткових асоціацій, розділені комами. Приклад:
          <strong>manager</strong> <br/><br/> Допустимі асоціації `manager`,
          `service`, `lead`, `client`'
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: filter
        in: query
        description: 'Фільтрація списку дзвінків'
        required: false
        style: deepObject
        explode: true
        schema:
          type: object
        examples:
          filter_by_reference_id:
            value:
              reference_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором товара, допустимі значення: 1, 10, 4546,
              ...'
          filter_by_client_id:
            value:
              client_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором клієнта'
          filter_by_manager_id:
            value:
              manager_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором менеджера'
          filter_by_lead_id:
            value:
              lead_id: '4545,4546'
            summary: 'Фільтр за ідентифікатором картки воронки'
          filter_by_type:
            value:
              type: incoming
            summary: 'Фільтр за типом дзвінка, допустимі значення: incoming, outgoing'
          filter_by_client_phone:
            value:
              client_phone: '+1 555-234-1234,+1 555-234-1234'
            summary: 'Фільтр за телефоном клієнта'
          filter_by_date_created:
            value:
              created_between: '2020-08-24 00:00:00, 2020-09-22 23:59:59'
            summary: 'Фільтр за датою створення'
    responses:
      200:
        description: 'Успішна відповідь для запиту з усіма доступними значеннями
          параметра `include`. Результат у пагінованому вигляді.'
        content:
          application/json:
            schema:
              type: object
              allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/CallWithIncludes'
      401:
        description: 'Помилка авторизації.'
    security:
      - bearerAuth: {}
