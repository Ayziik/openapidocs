                  type: object
                  properties:
                    name:
                      type: string
                      example: 'Iphone XS max 256gb'
                      description: 'Назва товару'
                    sku:
                      type: string
                      example: 001-242
                      description: 'Артикул товару'
                    price:
                      type: number
                      example: 124.5
                      description: 'Ціна товару за одиницю'
                    quantity:
                      type: number
                      example: 1
                      description: 'Кількість замовлених одиниць товару'
                    picture:
                      type: string
                      nullable: true
                      description: 'Посилання на зображеня товару'
                      example: 'https://i.etsystatic.com/22591342/r/il/52142a/2285383547/il_570xN.2285383547_h8a2.jpg'
              custom_fields:
                type: array
                description: 'Користувацькі поля у картці воронки'
                items:
                  type: object
                  properties:
                    uuid:
                      description: 'Зовнішній ідентифікатор поля'
                      type: string
                      example: LD_1021
                    value:
                      description: 'Значення поля. Для полів з типом `select (список/мультисписок)` передавати масив рядків.'
                      type: string
                      example: Лорд
    responses:
      202:
        description: 'Успішна відповідь'
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: boolean
                  example: true
      400:
        description: 'Розділ воронок вимкнено в налаштуваннях CRM.'
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Leads are not enabled'
      401:
        description: 'Помилка авторизації.'
    security:
      -
        bearerAuth: {  }
'/pipelines/cards/{cardId}/payment':
  post:
    tags:
      - Pipelines
    summary: 'Додавання нової оплати для існуючої картки у воронці'
    description: 'Даний маршрут створює нову оплату для картки у воронці.'
    parameters:
      -
        name: cardId
        in: path
        description: 'Ідентифікатор картки у воронці'
        required: true
        schema:
          type: string
      -
        $ref: '#/components/parameters/acceptParam'
    operationId: createNewPipelinesCardPayment
    requestBody:
      description: "Приклад об'єкту запиту для створення нової оплати"
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amount
            properties:
              payment_method_id:
                type: integer
                example: 2
                description: "ID методу платежу в keyCRM, обов'язковий параметр, якщо `payment_method` не заданий"
              payment_method:
                type: string
                example: 'Apple Pay'
                description: "Назва методу платежу, обов'язковий параметр, якщо `payment_method_id` не заданий"
              amount:
                type: number
                example: 123.5
                description: 'Сума платежу'
              status:
                type: string
                default: paid
                enum:
                  - paid
                  - not_paid
                  - canceled
                example: paid
                nullable: true
                description: 'Статус оплати'
              description:
                type: string
                example: 'Авансовий платіж'
                nullable: true
                description: 'Коментар до платежу'
              payment_date:
                type: string
                nullable: true
                example: '2021-02-21 14:44:00'
                description: 'Дата і час платежу. Якщо не передається, буде використаний поточний час'
    responses:
      201:
        description: 'Успішна відповідь від сервера.'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment'
      400:
        description: 'Розділ воронок вимкнено в налаштуваннях CRM.'
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Leads are not enabled'
      401:
        description: 'Помилка авторизації.'
    security:
      -
        bearerAuth: {  }
