          type: string
      -
        $ref: '#/components/parameters/acceptParam'
    responses:
      202:
        description: 'Успішна відповідь'
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: boolean
                  example: true
      401:
        description: 'Помилка авторизації.'
    security:
      -
        bearerAuth: {  }
  delete:
    tags:
      - Pipelines
    summary: 'Видалення файлу з картки воронки'
    description: 'Даний маршрут видаляє файл з картки воронки.'
    operationId: deleteFileFromCard
    parameters:
      -
        name: cardId
        in: path
        description: 'Ідентифікатор картки воронки'
        required: true
        schema:
          type: string
      -
        name: fileId
        in: path
        description: 'Ідентифікатор файлу'
        required: true
        schema:
          type: string
      -
        $ref: '#/components/parameters/acceptParam'
