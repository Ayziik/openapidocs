"/order/{orderId}/payment":
  post:
    tags:
      - Order
    summary: "Додавання нової оплати для існуючого замовлення"
    description: "Даний маршрут створює нову оплату для замовлення."
    parameters:
      - name: orderId
        in: path
        description: "Ідентифікатор замовлення"
        required: true
        schema:
          type: string
      - $ref: "#/components/parameters/acceptParam"
    operationId: createNewOrderPayment
    requestBody:
      description: "Приклад об'єкту запиту для створення нової оплати"
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amount
            properties:
              payment_method_id:
                type: integer
                example: 2
                description: "ID методу платежу в keyCRM, обов'язковий параметр, якщо
                  `payment_method` не заданий"
              payment_method:
                type: string
                example: "Apple Pay"
                description: "Назва методу платежу, обов'язковий параметр, якщо
                  `payment_method_id` не заданий"
              amount:
                type: number
                example: 123.5
                description: "Сума платежу"
              status:
                type: string
                default: paid
                enum:
                  - paid
                  - not_paid
                  - canceled
                example: paid
                nullable: true
                description: "Статус оплати"
              description:
                type: string
                example: "Авансовий платіж"
                nullable: true
                description: "Коментар до платежу"
              payment_date:
                type: string
                nullable: true
                example: "2021-02-21 14:44:00"
                description: "Дата і час платежу. Якщо не передається, буде використаний
                  поточний час"
    responses:
      201:
        description: "Успішна відповідь від сервера."
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Payment"
      401:
        description: "Помилка авторизації."
    security:
      - bearerAuth: {}
